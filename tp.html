<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>오늘의 로아 일정 미리보기</title>
    <style>
        body {
            background-color: #0f1115;
            color: #ffffff;
            font-family: 'Malgun Gothic', sans-serif;
            padding: 40px;
        }
        .container {
            display: flex;
            gap: 15px;
            max-width: 900px;
        }
        .card {
            flex: 1;
            background-color: #1a1d24;
            border: 1px solid #2d323e;
            border-radius: 8px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-title {
            font-size: 16px;
            font-weight: bold;
        }
        .time-badge {
            background-color: #4a3b10;
            color: #ffc107;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
        }
        .no-schedule {
            color: #6c757d;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h2>오늘의 일정 미리보기</h2>
    <div class="container">
        <div class="card">
            <span class="card-title">🌀 카오스게이트</span>
            <span id="chaos-gate" class="no-schedule">일정 불러오는 중...</span>
        </div>
        <div class="card">
            <span class="card-title">👹 필드보스</span>
            <span id="field-boss" class="no-schedule">일정 불러오는 중...</span>
        </div>
        <div class="card">
            <span class="card-title">🏝️ 모험 섬</span>
            <span id="island" class="no-schedule">일정 불러오는 중...</span>
        </div>
    </div>

    <script>
        // 🔑 본인의 API 키를 입력하세요.

        async function fetchCalendar() {
            try {
                const response = await fetch('https://developer-lostark.game.onstove.com/gamecontents/calendar', {
                    headers: {
                        'accept': 'application/json',
                        'authorization': `Bearer ${API_KEY}`
                    }
                });

                if (!response.ok) throw new Error('API 호출 실패! 키를 확인하세요.');

                const data = await response.json();
                
                // 오늘 날짜 계산 (YYYY-MM-DD)
                const todayStr = new Date().toISOString().split('T')[0];

                // CategoryName별 데이터 찾기
                const categories = {
                    '카오스게이트': 'chaos-gate',
                    '필드보스': 'field-boss',
                    '모험 의 섬': 'island'
                };

                // 초기화
                Object.values(categories).forEach(id => {
                    document.getElementById(id).textContent = "일정 없음";
                });

                data.forEach(item => {
                    if (categories[item.CategoryName]) {
                        // 오늘 출현하는 시간 중 첫 번째 시간 가져오기
                        const todayTime = item.StartTimes?.find(time => time.startsWith(todayStr));
                        
                        if (todayTime) {
                            const timeOnly = todayTime.split('T')[1].substring(0, 5); // HH:MM 형식
                            const element = document.getElementById(categories[item.CategoryName]);
                            element.textContent = `${timeOnly} 예정`;
                            element.className = 'time-badge';
                        }
                    }
                });

            } catch (error) {
                console.error(error);
                alert("데이터를 가져오는 데 실패했습니다. API 키나 브라우저 CORS 설정을 확인해 주세요.");
            }
        }

        // 페이지 로드 시 API 실행
        fetchCalendar();
    </script>
</body>
</html>
